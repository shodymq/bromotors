services:
  postgres:
    image: postgres:16
    container_name: bromotors-postgres
    environment:
      POSTGRES_DB: bromotors
      POSTGRES_USER: bromotors
      POSTGRES_PASSWORD: bromotors
    ports:
      - "5432:5432"
    volumes:
      - bromotors-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bromotors -d bromotors"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bromotors-postgres-data:
